<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>JugandorCriticonOficial</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
</head>

<body>

<header>

    <div class="logo">
        <img src="logito.png" alt="Logo del canal">
        <span>JugandorCriticonOficial</span>
    </div>

    <div class="estado">
        🔴 EN VIVO
    </div>

</header>

<div class="contenedor">

    <main class="video">

        <!-- De momento seguimos usando el reproductor de MediaMTX -->
<video
    id="player"
    controls
    playsinline
    autoplay>
</video>

        <div class="info">

            <h2>🎮 JugandorCriticonOficial</h2>

            <p>
                ¡Bienvenido al directo! Si disfrutas del contenido puedes seguirme en todas mis plataformas:
            </p>

            <div class="sociales">

                <a href="https://www.twitch.tv/jugandorcriticonoficial"
                   target="_blank"
                   class="twitch">
                    🟣 Twitch
                </a>

                <a href="https://kick.com/jugandorcriticon"
                   target="_blank"
                   class="kick">
                    🟢 Kick
                </a>

                <a href="https://www.patreon.com/c/JugandorCriticonOficial"
                   target="_blank"
                   class="patreon">
                    ❤️ Patreon
                </a>

                <a href="https://x.com/JugandorAmigo"
                   target="_blank"
                   class="twitter">
                    ⚫ X
                </a>

            </div>

        </div>

    </main>

    <aside>

        <div class="banner">

            <h2>🎮 JugandorCriticonOficial</h2>

            <p>
                Reacciones • Videojuegos • Directos
            </p>

        </div>

        <div class="chat">

            <div class="chat-header">
                💬 Chat de Twitch
            </div>

            <iframe
                class="twitch-chat"
                src="https://www.twitch.tv/embed/JugandorCriticonOficial/chat?darkpopout&parent=lagrasanomuere.github.io">
            </iframe>

        </div>

    </aside>

</div>

<script src="script.js"></script>

</body>
</html>
