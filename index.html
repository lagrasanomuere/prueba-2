<!DOCTYPE html>
<html lang="es">

    <title>Mi Streaming</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">
        🎮 MiStreaming
    </div>

    <div class="estado">
        🔴 EN VIVO

</header>

<div class="contenedor">

    <main class="video">

        <iframe
            src="http://127.0.0.1:8889/live/mistream/"
            allow="autoplay; fullscreen">
        </iframe>

        <div class="info">

            <h2>Mi transmisión</h2>

            <p>
                Bienvenido al directo.
            </p>

        </div>

    </main>

    <aside>

        <div class="banner">

            <h2>Mi Canal</h2>

            <p>
                Streaming 24/7
            </p>

        </div>

     <div class="chat">

    <div class="chat-header">
        💬 Chat de Twitch
    </div>

    <iframe
        class="twitch-chat"
        src="https://www.twitch.tv/embed/JugandorCriticonOficial/chat?parent=localhost"
        allowfullscreen>
    </iframe>

</div>

    </aside>

</div>
