<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Streaming</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0e0e10;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    display:grid;
    grid-template-columns: 1fr 340px;
    height:100vh;
}

.video{
    padding:20px;
}

.video h1{
    margin-bottom:15px;
    font-size:30px;
}

iframe{
    width:100%;
    height:85vh;
    border:none;
    border-radius:12px;
    background:black;
}

.sidebar{
    background:#18181b;
    border-left:1px solid #2b2b2e;
    display:flex;
    flex-direction:column;
}

.banner{
    padding:20px;
    border-bottom:1px solid #2b2b2e;
}

.banner img{
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
}

.banner h2{
    font-size:22px;
}

.banner p{
    color:#b3b3b3;
    margin-top:5px;
}

.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.message{
    margin-bottom:12px;
}

.message b{
    color:#9147ff;
}

.send{
    display:flex;
    padding:15px;
    border-top:1px solid #2b2b2e;
}

.send input{
    flex:1;
    background:#2b2b2e;
    color:white;
    border:none;
    outline:none;
    padding:12px;
    border-radius:8px;
}

.send button{
    margin-left:10px;
    background:#9147ff;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

.send button:hover{
    background:#772ce8;
}

</style>

</head>

<body>

<div class="container">

    <main class="video">

        <h1>🔴 Mi transmisión</h1>

        <iframe
        src="http://127.0.0.1:8889/live/mistream/"
        allow="autoplay; fullscreen">
        </iframe>

    </main>

    <aside class="sidebar">

        <div class="banner">

            <img src="https://placehold.co/320x120/222/ffffff?text=Mi+Banner">

            <h2>Mi Canal</h2>

            <p>🟢 En vivo ahora</p>

        </div>

        <div class="chat">

            <div class="messages">

                <div class="message">
                    <b>Alex:</b> Hola 👋
                </div>

                <div class="message">
                    <b>Usuario:</b> Se ve excelente.
                </div>

            </div>

            <div class="send">

                <input type="text" placeholder="Escribe un mensaje...">

                <button>Enviar</button>

            </div>

        </div>

    </aside>

</div>

</body>
</html>
